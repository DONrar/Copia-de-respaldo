<!-- src/app/pages/login/login.page.html -->
<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title class="ion-text-center">Control Vehicular</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="login-container">

    <!-- Logo -->
    <div class="logo-container">
      <ion-icon name="shield-checkmark" color="primary" class="logo-icon"></ion-icon>
      <h1 class="app-title">Sistema de Control</h1>
      <p class="app-subtitle">Acceso Vehicular</p>
    </div>

    <!-- Formulario de Login -->
    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title color="primary">Iniciar Sesión</ion-card-title>
        <ion-card-subtitle>Guarda de Seguridad</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <form (ngSubmit)="login()">

          <!-- Usuario -->
          <ion-item class="input-item" lines="none">
            <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
            <ion-input
              type="text"
              placeholder="Usuario"
              [(ngModel)]="credentials.username"
              name="username"
              autocomplete="username"
              [clearInput]="true"
              required>
            </ion-input>
          </ion-item>

          <!-- Contraseña -->
          <ion-item class="input-item" lines="none">
            <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
            <ion-input
              type="password"
              placeholder="Contraseña"
              [(ngModel)]="credentials.password"
              name="password"
              autocomplete="current-password"
              [clearInput]="true"
              required>
            </ion-input>
          </ion-item>

          <!-- Mensaje de Error -->
          <ion-text color="danger" *ngIf="errorMessage" class="error-message">
            <p class="ion-text-center">
              <ion-icon name="alert-circle-outline"></ion-icon>
              {{ errorMessage }}
            </p>
          </ion-text>

          <!-- Botón Ingresar -->
          <ion-button
            expand="block"
            type="submit"
            [disabled]="loading"
            class="login-button">
            <ion-spinner name="crescent" *ngIf="loading"></ion-spinner>
            <span *ngIf="!loading">Ingresar</span>
          </ion-button>

          <!-- Botón de Prueba (solo desarrollo) -->
          <ion-button
            expand="block"
            fill="outline"
            color="medium"
            (click)="fillTestCredentials()"
            class="test-button">
            <ion-icon name="flash-outline" slot="start"></ion-icon>
            Llenar credenciales de prueba
          </ion-button>

        </form>
      </ion-card-content>
    </ion-card>

    <!-- Footer -->
    <div class="footer">
      <p class="ion-text-center">
        <ion-text color="medium">
          <small>Sistema de Control Vehicular v1.0.0</small>
        </ion-text>
      </p>
      <p class="ion-text-center">
        <ion-text color="medium">
          <small>Usuarios de prueba: guarda1, guarda2, admin</small>
        </ion-text>
      </p>
    </div>

  </div>
</ion-content>
