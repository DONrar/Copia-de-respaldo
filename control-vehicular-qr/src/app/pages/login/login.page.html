<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Control Vehicular</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Iniciar Sesión</ion-card-title>
        <ion-card-subtitle>Acceso para guardas</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-item>
          <ion-label position="stacked">Usuario</ion-label>
          <ion-input
            type="text"
            [(ngModel)]="credentials.username"
            placeholder="Ingrese su usuario">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input
            type="password"
            [(ngModel)]="credentials.password"
            placeholder="Ingrese su contraseña">
          </ion-input>
        </ion-item>

        <ion-button
          expand="block"
          (click)="login()"
          class="ion-margin-top">
          Ingresar
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
