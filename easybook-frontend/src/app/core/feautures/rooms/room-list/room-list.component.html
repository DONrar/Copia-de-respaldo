<body>
  <h2 class="section-title">Gestión de Habitaciones</h2>

  <section class="create-card">
    <form [formGroup]="form" (ngSubmit)="create()">
      <div class="row">
        <label for="roomNumber">Número de Habitación</label>
        <input
          id="roomNumber"
          formControlName="number"
          placeholder="Ej: 101, 201, 305..."
          type="number"
          min="1"
          max="999"
        />
      </div>

      <div class="row">
        <label for="roomType">Tipo de Habitación</label>
        <select id="roomType" formControlName="type">
          <option value="">Selecciona un tipo</option>
          <option value="single">🛏️ Single</option>
          <option value="double">🛏️🛏️ Double</option>
          <option value="deluxe">⭐ Deluxe</option>
        </select>
      </div>

      <button class="btn" [disabled]="form.invalid || loading()">
        <span *ngIf="!loading()">➕ Crear Habitación</span>
        <span *ngIf="loading()">
          <span class="loading">⏳</span> Creando...
        </span>
      </button>

      <span class="error" *ngIf="error()">{{ error() }}</span>
      <span class="ok" *ngIf="ok()">✅ Habitación creada exitosamente</span>
    </form>
  </section>

  <section class="list-card" *ngIf="rooms().length; else empty">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Número</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of rooms()">
            <td data-label="Número">
              <strong>{{ r.number }}</strong>
            </td>
            <td data-label="Tipo">
              <span class="status-badge" [ngClass]="{
                'status-single': r.type === 'single',
                'status-double': r.type === 'double',
                'status-deluxe': r.type === 'deluxe'
              }">
                {{ r.type }}
              </span>
            </td>
            <td data-label="Estado">
              <span *ngIf="r.status" class="status-badge" [ngClass]="{
                'status-available': r.status === 'available',
                'status-occupied': r.status === 'occupied',
                'status-maintenance': r.status === 'maintenance'
              }">
                {{ r.status }}
              </span>
              <span *ngIf="!r.status" class="muted">—</span>
            </td>
            <td data-label="Acciones">
              <button
                class="btn btn-danger"
                (click)="delete(r)"
                [disabled]="loading()"
                [attr.aria-label]="'Eliminar habitación ' + r.number"
              >
                🗑️ Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <ng-template #empty>
    <div class="muted">
      <p>No hay habitaciones registradas todavía.</p>
      <p><small>Crea la primera habitación usando el formulario superior.</small></p>
    </div>
  </ng-template>
</body>
